{% extends "quotes/base.html" %}

{% block title %}{{ author.fullname }}{% endblock %}

{% block content %}
    <section class="page-intro">
        <h1 class="page-title">{{ author.fullname }}</h1>
        <p class="page-subtitle">Birth details and background.</p>
    </section>

    <section class="detail-card">
        <div class="detail-grid">
            <div class="detail-item">
                <span class="detail-label">Born</span>
                <span>{{ author.born_date }}</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Location</span>
                <span>{{ author.born_location }}</span>
            </div>
        </div>

        <p>{{ author.description }}</p>

        <a class="button-link spaced-link" href="{% url 'quotes:index' %}">Back to Quotes</a>
    </section>
{% endblock %}
